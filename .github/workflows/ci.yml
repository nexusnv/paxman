name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions; jobs opt-in to more as needed.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint, format, mypy, import-linter (the "core" gate; required)
  # ---------------------------------------------------------------------------
  lint:
    name: lint + format + typecheck + imports (py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy --strict src/paxman

      - name: Import-linter (module DAG enforcement)
        run: uv run lint-imports

  # ---------------------------------------------------------------------------
  # pyright (cross-validation; advisory)
  # ---------------------------------------------------------------------------
  pyright:
    name: pyright cross-validation (py3.12) — advisory
    runs-on: ubuntu-latest
    continue-on-error: true  # D8.19: pyright is advisory; mypy --strict is the gate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Type check (pyright cross-validation)
        run: uv run pyright src/paxman

  # ---------------------------------------------------------------------------
  # interrogate (100% docstring coverage on the public surface; required)
  # ---------------------------------------------------------------------------
  interrogate:
    name: interrogate — 100% docstring coverage on public surface
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Docstring coverage (interrogate, 100% on public surface)
        run: uv run interrogate -vv src/paxman

  # ---------------------------------------------------------------------------
  # bandit (security lint; advisory)
  # ---------------------------------------------------------------------------
  bandit:
    name: bandit — security lint — advisory
    runs-on: ubuntu-latest
    continue-on-error: true  # D8.21: bandit is advisory; review and triage findings
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Security lint (bandit)
        run: uv run bandit -r src/paxman -c pyproject.toml

  # ---------------------------------------------------------------------------
  # pip-audit (dependency vulnerabilities; advisory — block on Critical/High
  # only via triage policy in CONTRIBUTING.md)
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit — dependency vulnerabilities — advisory
    runs-on: ubuntu-latest
    continue-on-error: true  # D8.22: advisory; security advisories are triaged separately
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

  # ---------------------------------------------------------------------------
  # Unit tests (fast)
  # ---------------------------------------------------------------------------
  test-unit:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev --python ${{ matrix.python-version }}

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/unit --no-header

  # ---------------------------------------------------------------------------
  # Property tests (hypothesis)
  # ---------------------------------------------------------------------------
  test-property:
    name: property tests (py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Run property tests
        run: uv run pytest -m property --no-header

  # ---------------------------------------------------------------------------
  # Integration tests (slow; uses real fixtures)
  # ---------------------------------------------------------------------------
  test-integration:
    name: integration tests (py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Run integration tests
        run: uv run pytest tests/integration --no-header

  # ---------------------------------------------------------------------------
  # Reference example smoke tests (Sprint 10: persona coverage)
  # ---------------------------------------------------------------------------
  test-examples:
    name: test-examples (py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Smoke-test backend_service
        run: |
          if [ -f examples/backend_service/pyproject.toml ]; then
            uv pip install --python .venv/bin/python -e "examples/backend_service[dev]"
            PYTHONPATH=examples/backend_service/src .venv/bin/python -m pytest examples/backend_service/tests/ -v
          else
            echo "backend_service: not yet implemented, skipping"
          fi

      - name: Smoke-test ai_agent_ingest
        run: |
          if [ -f examples/ai_agent_ingest/pyproject.toml ]; then
            uv pip install --python .venv/bin/python -e "examples/ai_agent_ingest[dev]"
            PYTHONPATH=examples/ai_agent_ingest/src .venv/bin/python -m pytest examples/ai_agent_ingest/tests/ -v
          else
            echo "ai_agent_ingest: not yet implemented, skipping"
          fi

      - name: Smoke-test saas_procurement
        run: |
          if [ -f examples/saas_procurement/pyproject.toml ]; then
            uv pip install --python .venv/bin/python -e "examples/saas_procurement[dev]"
            PYTHONPATH=examples/saas_procurement/src .venv/bin/python -m pytest examples/saas_procurement/tests/ -v
          else
            echo "saas_procurement: not yet implemented, skipping"
          fi

  # ---------------------------------------------------------------------------
  # Coverage (runs on py3.12; uploads to Codecov)
  # ---------------------------------------------------------------------------
  test-coverage:
    name: coverage + per-subsystem thresholds (py3.12)
    runs-on: ubuntu-latest
    needs: [lint, interrogate, test-unit, test-property, test-integration, test-examples]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Run tests with coverage
        run: uv run pytest --cov=paxman --cov-report=term-missing --cov-report=xml --cov-report=json

      - name: Verify per-subsystem coverage (D7.15)
        run: uv run python scripts/check_subsystem_coverage.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    needs: [test-coverage]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install build dependencies
        run: uv sync --frozen --dev

      - name: Build (hatchling)
        run: uv run hatchling build

      - name: Inspect wheel (verify py.typed, no __pycache__)
        run: |
          python -c "
          import zipfile, pathlib
          wheel = sorted(pathlib.Path('dist').glob('*.whl'))[0]
          contents = zipfile.ZipFile(wheel).namelist()
          assert any('paxman/__init__.py' in c for c in contents), 'paxman/__init__.py missing from wheel'
          assert any('paxman/py.typed' in c for c in contents), 'paxman/py.typed missing from wheel'
          assert not any('__pycache__' in c for c in contents), '__pycache__ found in wheel'
          print(f'OK: {wheel.name} has {len(contents)} entries')
          "
