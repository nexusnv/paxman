name: Release

on:
  push:
    tags:
      - "v*"
  # Allow manual trigger for re-running failed releases on a specific tag
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.5.0)'
        required: true
        type: string

# Cancel in-progress runs for the same tag (safety)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-progress releases

# Minimal permissions; jobs opt-in to more as needed.
# `id-token: write` is REQUIRED for PyPI OIDC trusted publishing
# but is scoped to the publish job below (not top-level).
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build wheel + sdist
  # ---------------------------------------------------------------------------
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --all-extras --dev

      - name: Run CI gates (lint, format, typecheck, tests, security)
        # Run the same checks as make ci to gate the release
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy --strict src/paxman
          uv run lint-imports
          uv run interrogate -vv src/paxman
          uv run bandit -r src/paxman -c pyproject.toml
          uv run pip-audit
          uv run pytest tests/unit tests/property tests/integration --no-header

      - name: Build (hatchling)
        run: uv run hatchling build

      - name: Inspect wheel (verify py.typed, no __pycache__)
        run: |
          python -c "
          import zipfile, pathlib
          wheel = sorted(pathlib.Path('dist').glob('*.whl'))[0]
          contents = zipfile.ZipFile(wheel).namelist()
          assert any('paxman/__init__.py' in c for c in contents), 'paxman/__init__.py missing from wheel'
          assert any('paxman/py.typed' in c for c in contents), 'paxman/py.typed missing from wheel'
          assert not any('__pycache__' in c for c in contents), '__pycache__ found in wheel'
          print(f'OK: {wheel.name} has {len(contents)} entries')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: dist
          path: dist/

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI via OIDC trusted publishing
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    permissions:
      contents: read
      id-token: write  # Required for PyPI OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          # OIDC: no API token needed; the GitHub OIDC token authenticates
          # the publish request via the PyPI trusted publisher config.

  # ---------------------------------------------------------------------------
  # Publish to PyPI via OIDC trusted publishing (Sprint 10; commented out for now)
  # ---------------------------------------------------------------------------
  publish-pypi:
    permissions:
      contents: read
      id-token: write  # Required for PyPI OIDC trusted publishing
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, publish-testpypi]
    environment: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1
        with:
          packages-dir: dist/
