# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.
#
# This config is intentionally minimal: it points RTD at mkdocs.yml at the
# repo root, uses Python 3.12 (matching the rest of the CI), and installs
# the [dependency-groups] dev group (which now includes the docs stack:
# mkdocs, mkdocs-material, mkdocs-autorefs) plus the optional adapter
# extras so cross-references like pydantic/attrs resolve cleanly.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - python -m pip install --upgrade pip
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --all-extras --group dev
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv pip install mkdocs mkdocs-material mkdocs-autorefs

# Build documentation with MkDocs
mkdocs:
  configuration: mkdocs.yml
  # RTD's default MkDocs build uses `--strict` already; failing on warnings.
  fail_on_warning: true

# Search is enabled by default in mkdocs-material; no extra config needed.
